<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-User Communication - SignDetect</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        .comm-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .video-box {
            position: relative;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            aspect-ratio: 16/9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .caption-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.5rem;
            text-align: center;
            width: 80%;
            pointer-events: none;
            display: none;
            z-index: 10;
            border-left: 5px solid #ff4757;
        }
        .controls-panel {
            grid-column: span 2;
            display: flex;
            justify-content: center;
            gap: 20px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .room-bar {
            grid-column: span 2;
            text-align: center;
            margin-bottom: 20px;
        }
        .room-input {
            padding: 10px 20px;
            border-radius: 25px;
            border: 2px solid #dfe4ea;
            font-size: 1rem;
            width: 300px;
            outline: none;
        }
        .toggle-btn {
            background: #f1f2f6;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .toggle-btn.active {
            background: #2ed573;
            color: white;
        }
        .toggle-btn.danger {
            background: #ff4757;
            color: white;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #747d8c;
            display: inline-block;
        }
        .status-dot.online { background: #2ed573; }
        
        #localDetection, #remoteDetection {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            color: #2ed573;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <nav>
        <h2>🤟 SignDetect</h2>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/live">Live Detection</a></li>
            <li><a href="/transcribe">Live Transcription</a></li>
            <li><a href="/communicate">Multi-User</a></li>
            <li><a href="/features">Features</a></li>
            <li><a href="/about">About</a></li>
        </ul>
    </nav>

    <h1 class="page-title">Universal Multi-User Communication</h1>

    <div class="room-bar">
        <label>Room ID: </label>
        <input type="text" id="roomIdInput" class="room-input" value="SignLanguageLive" placeholder="Enter a name to join...">
        <button id="joinBtn" class="main-btn" style="margin-left: 10px;">Connect & Join</button>
        <p id="connStatus" style="margin-top: 10px; color: #747d8c;">
            <span id="statusDot" class="status-dot"></span> 
            <span id="statusText">Disconnected</span>
        </p>
    </div>

    <div class="comm-container">
        <!-- Local User -->
        <div class="video-box">
            <video id="localVideo" autoplay muted playsinline></video>
            <div id="localCaption" class="caption-overlay"></div>
            <div id="localDetection">Gesture Name</div>
            <div class="video-label">You (Local)</div>
        </div>

        <!-- Remote User -->
        <div class="video-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <div id="remoteCaption" class="caption-overlay"></div>
            <div id="remoteDetection">Gesture Name</div>
            <div class="video-label">Peer (Remote)</div>
        </div>

        <div class="controls-panel">
            <button id="toggleSignBtn" class="toggle-btn">
                <span>🤟</span> Detect Signs
            </button>
            <button id="toggleTransBtn" class="toggle-btn">
                <span>🎙️</span> Voice Transcription
            </button>
            <button id="toggleTTSBtn" class="toggle-btn active">
                <span>🔊</span> Text-to-Speech
            </button>
            <button id="leaveBtn" class="toggle-btn danger">
                <span>🚫</span> Disconnect
            </button>
        </div>
    </div>

    <script src="/static/communication.js?v=20260311"></script>
</body>
</html>
